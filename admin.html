<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Portal — ChildMind</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --dark: #0f172a; --accent: #2563eb; --surface: #1e293b; --text: #f8fafc; }
  body { background: var(--dark); font-family: 'DM Sans', sans-serif; color: var(--text); margin: 0; }
  nav { background: var(--surface); padding: 15px 5%; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Lora', serif; font-size: 20px; font-weight: 700; color: #fff; text-decoration: none; }
  .logo span { color: var(--accent); }
  .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--surface); padding: 25px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
  .stat-num { font-size: 32px; font-weight: 700; display: block; margin-bottom: 5px; }
  .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
  .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Child<span>Mind</span></a>
    <span style="font-size: 12px; color: #94a3b8;">Partner Portal Console</span>
  </nav>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
      <h1 style="font-family:'Lora', serif; margin:0;">Platform Dashboard</h1>
      <button class="btn">Add Research Report</button>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-num" id="totalVisitors">0</span><span class="stat-label">Total Readers</span></div>
      <div class="stat-card"><span class="stat-num" id="totalUsers">0</span><span class="stat-label">Subscribers</span></div>
      <div class="stat-card"><span class="stat-num" id="publishedCount">0</span><span class="stat-label">Live Reports</span></div>
      <div class="stat-card"><span class="stat-num" id="totalLikes">0</span><span class="stat-label">Research Impact</span></div>
    </div>
  </div>
  <script src="blog-config.js"></script>
</body>
</html>
