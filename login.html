<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — CuriousMinds</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0c1a2e;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(13,148,136,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(13,148,136,.05) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.orb1{position:fixed;top:-150px;right:-150px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(13,148,136,.12) 0%,transparent 70%);pointer-events:none}
.orb2{position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,233,.08) 0%,transparent 70%);pointer-events:none}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;text-decoration:none;position:relative;z-index:1}
.brand-icon{width:38px;height:38px;background:linear-gradient(135deg,#0d9488,#0ea5e9);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px}
.brand-name{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
.brand-name span{color:#2dd4bf}
.card{background:#111827;border:1px solid #1e293b;border-radius:22px;padding:2.25rem 2rem;width:100%;max-width:410px;box-shadow:0 24px 60px rgba(0,0,0,.5);position:relative;z-index:1}
.card-line{position:absolute;top:0;left:2rem;right:2rem;height:2px;background:linear-gradient(90deg,#0d9488,#0ea5e9);border-radius:2px}
.card-title{font-family:'Bricolage Grotesque',sans-serif;font-size:21px;font-weight:700;color:#f1f5f9;letter-spacing:-.3px;margin-bottom:.3rem;text-align:center}
.card-sub{font-size:13px;color:#475569;text-align:center;margin-bottom:1.75rem;line-height:1.6}
.tabs{display:flex;background:#0a0f1a;border:1px solid #1e293b;border-radius:11px;padding:3px;margin-bottom:1.5rem;gap:3px}
.tab{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#475569;font-family:'DM Sans',sans-serif;transition:all .2s}
.tab.active{background:#1e293b;color:#f1f5f9;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.fg{margin-bottom:.9rem}
.fg label{font-size:11px;font-weight:600;color:#64748b;display:block;margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase}
.fg input{width:100%;padding:10px 13px;background:#0a0f1a;border:1px solid #1e293b;border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;color:#f1f5f9;transition:border-color .2s,box-shadow .2s}
.fg input::placeholder{color:#334155}
.fg input:focus{border-color:#0d9488;box-shadow:0 0 0 3px rgba(13,148,136,.12)}
.btn-p{width:100%;background:linear-gradient(135deg,#0d9488,#0a7c70);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .15s;margin-top:.4rem}
.btn-p:hover{opacity:.88;transform:translateY(-1px)}
.divider{display:flex;align-items:center;gap:12px;margin:1.35rem 0;font-size:12px;color:#334155}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1e293b}
.btn-g{width:100%;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:box-shadow .2s,transform .15s;color:#1a1a1a}
.btn-g:hover{box-shadow:0 4px 16px rgba(0,0,0,.15);transform:translateY(-1px)}
.msg{font-size:13px;margin-top:.9rem;padding:10px 13px;border-radius:9px;display:none;font-weight:500}
.msg.error{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2);display:block}
.msg.success{background:rgba(13,148,136,.1);color:#2dd4bf;border:1px solid rgba(13,148,136,.2);display:block}
.back{display:block;margin-top:1.35rem;font-size:13px;color:#334155;text-decoration:none;text-align:center;transition:color .2s}
.back:hover{color:#2dd4bf}
@media(max-width:480px){.card{padding:1.75rem 1.4rem}}
</style>
</head>
<body>
<div class="bg-grid"></div><div class="orb1"></div><div class="orb2"></div>

<a href="index.html" class="brand">
  <div class="brand-icon">🧠</div>
  <span class="brand-name">Curious<span>Minds</span></span>
</a>

<div class="card">
  <div class="card-line"></div>
  <div class="card-title">Welcome back</div>
  <p class="card-sub">Join parents & educators reading<br>science-backed child development insights</p>

  <div class="tabs">
    <button class="tab active" id="loginTab" onclick="showTab('login')">Sign In</button>
    <button class="tab" id="signupTab" onclick="showTab('signup')">Sign Up</button>
  </div>

  <div id="loginForm">
    <div class="fg"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
    <button class="btn-p" onclick="emailLogin()">Sign In →</button>
    <div class="divider">or continue with</div>
    <button class="btn-g" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <div id="signupForm" style="display:none">
    <div class="fg"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name"></div>
    <div class="fg"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
    <div class="fg"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
    <button class="btn-p" onclick="emailSignup()">Create Account →</button>
    <div class="divider">or continue with</div>
    <button class="btn-g" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign up with Google
    </button>
  </div>

  <div class="msg" id="msg"></div>
  <a href="index.html" class="back">← Back to CuriousMinds</a>
</div>

<script src="blog-config.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,signInWithPopup,GoogleAuthProvider,signInWithEmailAndPassword,createUserWithEmailAndPassword,updateProfile}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

function msg(text,type){const el=document.getElementById('msg');el.textContent=text;el.className='msg '+type;}

window.showTab=function(tab){
  document.getElementById('loginForm').style.display=tab==='login'?'':'none';
  document.getElementById('signupForm').style.display=tab==='signup'?'':'none';
  document.getElementById('loginTab').className='tab'+(tab==='login'?' active':'');
  document.getElementById('signupTab').className='tab'+(tab==='signup'?' active':'');
  document.getElementById('msg').className='msg';
};

window.googleLogin=async function(){
  try{
    msg('Opening Google sign-in…','success');
    const c=await signInWithPopup(auth,provider);
    await saveUser(c.user,'google');
    msg('Signed in! Redirecting…','success');
    setTimeout(()=>window.location.href='index.html',1000);
  }catch(e){
    if(e.code==='auth/popup-closed-by-user')msg('Sign-in cancelled.','error');
    else msg(e.message,'error');
  }
};

window.emailLogin=async function(){
  const email=document.getElementById('loginEmail').value;
  const pass=document.getElementById('loginPassword').value;
  try{await signInWithEmailAndPassword(auth,email,pass);msg('Signed in! Redirecting…','success');setTimeout(()=>window.location.href='index.html',1000);}
  catch(e){msg('Wrong email or password.','error');}
};

window.emailSignup=async function(){
  const name=document.getElementById('signupName').value;
  const email=document.getElementById('signupEmail').value;
  const pass=document.getElementById('signupPassword').value;
  if(!name||!email||!pass){msg('Please fill in all fields.','error');return;}
  if(pass.length<6){msg('Password must be at least 6 characters.','error');return;}
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(c.user,{displayName:name});
    await saveUser({...c.user,displayName:name},'email');
    msg('Account created! Redirecting…','success');
    setTimeout(()=>window.location.href='index.html',1000);
  }catch(e){
    if(e.code==='auth/email-already-in-use')msg('Email already registered. Try signing in.','error');
    else msg(e.message,'error');
  }
};

async function saveUser(user,prov){
  if(!JSONBIN_CONFIG.apiKey||JSONBIN_CONFIG.apiKey==='YOUR_JSONBIN_API_KEY_HERE')return;
  if(user.email===ADMIN_EMAIL)return;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.usersBinId}/latest`,{headers:{'X-Master-Key':JSONBIN_CONFIG.apiKey}});
    const d=await r.json();const users=d.record?.users||[];
    if(users.some(u=>u.email===user.email))return;
    users.push({email:user.email,name:user.displayName||'',provider:prov,date:new Date().toISOString()});
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_CONFIG.usersBinId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_CONFIG.apiKey},body:JSON.stringify({users})});
  }catch(e){}
}
</script>
</body>
</html>
