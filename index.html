<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChildMind | Science-Backed Education</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --accent: #2563eb; --dark: #0f172a; --bg: #f8fafc; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #1e293b; margin: 0; }
  nav { background: #fff; padding: 1.2rem 5%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Lora', serif; font-size: 24px; font-weight: 700; color: var(--dark); text-decoration: none; }
  .logo span { color: var(--accent); }
  .hero { background: var(--dark); color: #fff; padding: 120px 5%; text-align: center; }
  .hero h1 { font-family: 'Lora', serif; font-size: 52px; margin: 20px 0; }
  .hero p { max-width: 600px; margin: 0 auto 40px; font-size: 19px; color: #94a3b8; }
  .grid { max-width: 1200px; margin: 60px auto; padding: 0 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; }
  .card { background: #fff; border-radius: 16px; padding: 30px; border: 1px solid #e2e8f0; text-decoration: none; color: inherit; transition: 0.3s; }
  .card:hover { transform: translateY(-5px); border-color: var(--accent); }
</style>
</head>
<body>
<nav><a href="index.html" class="logo">Child<span>Mind</span></a></nav>
<section class="hero"><h1>Unlock the Science of <span>Learning</span></h1><p>Professional insights and research-backed strategies for modern educators.</p></section>
<div class="grid" id="postGrid"></div>
<script src="blog-config.js"></script>
<script>
  const grid = document.getElementById('postGrid');
  BLOG_POSTS.forEach(p => {
    if(p.comingSoon) return;
    grid.innerHTML += `<a href="${p.file}" class="card"><div style="font-size:40px; margin-bottom:20px;">${p.icon}</div><h3 style="font-family:'Lora',serif; font-size:22px; margin:0 0 10px;">${p.title}</h3><p style="color:#64748b; font-size:15px; margin:0;">${p.excerpt}</p></a>`;
  });
</script>
</body>
</html>
